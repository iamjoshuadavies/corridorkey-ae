name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Python runtime tests ---
  runtime-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd runtime
          pip install -e ".[dev]"

      - name: Lint
        run: |
          cd runtime
          ruff check server/ engines/ models/ tests/

      - name: Type check
        run: |
          cd runtime
          mypy server/ engines/ models/ --ignore-missing-imports || true

      - name: Test
        run: |
          cd runtime
          pytest tests/ -v --tb=short

  # --- C++ plugin build (stub mode, no AE SDK) ---
  plugin-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug
