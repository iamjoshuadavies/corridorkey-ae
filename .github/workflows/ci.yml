name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # Allow manual runs from the Actions tab

# Cancel in-flight runs when a new commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Minimal AE SDK subset (headers + utils + AE_General.r + PiPLtool.exe)
  # hosted as a release asset on this repo. See the ci-deps-v1 release
  # for contents and Adobe attribution. Downloaded via `gh release download`
  # which handles auth for private repos transparently.
  AE_SDK_RELEASE_TAG: ci-deps-v1
  AE_SDK_ASSET_NAME: ae-sdk-minimal.zip

jobs:
  # =============================================================================
  # Python runtime — lint, type-check, tests on Linux
  # =============================================================================
  runtime-tests:
    name: Runtime (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: runtime/pyproject.toml

      - name: Install dependencies
        working-directory: runtime
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: runtime
        run: ruff check server/ engines/ models/ tests/

      - name: Type check (mypy)
        working-directory: runtime
        run: mypy server/ engines/ models/ --ignore-missing-imports || true

      - name: Test (pytest)
        working-directory: runtime
        run: pytest tests/ -v --tb=short

  # =============================================================================
  # C++ plugin — real build with minimal SDK, produces shippable artifacts
  # =============================================================================
  plugin-build:
    name: Plugin (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: runtime-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: CorridorKey-macOS
            plugin-path: build/plugin/CorridorKey.plugin
          - os: windows-2022
            name: Windows
            artifact: CorridorKey-Windows
            plugin-path: build/plugin/Release/CorridorKey.aex

    steps:
      - uses: actions/checkout@v4

      # --- Download the minimal AE SDK from our release assets -----------------
      # `gh release download` uses the GitHub CLI's built-in token handling,
      # which works transparently for private repos (unlike raw curl/wget
      # against the browser-facing releases/download URL, which redirects
      # through auth and breaks).
      - name: Download AE SDK (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$AE_SDK_RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$AE_SDK_ASSET_NAME" \
            --output ae-sdk.zip
          mkdir -p ae-sdk
          unzip -q ae-sdk.zip -d ae-sdk
          echo "AE_SDK_PATH=$GITHUB_WORKSPACE/ae-sdk/Examples" >> "$GITHUB_ENV"

      - name: Download AE SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$env:AE_SDK_RELEASE_TAG" `
            --repo "${{ github.repository }}" `
            --pattern "$env:AE_SDK_ASSET_NAME" `
            --output ae-sdk.zip
          Expand-Archive -Path ae-sdk.zip -DestinationPath ae-sdk -Force
          "AE_SDK_PATH=$env:GITHUB_WORKSPACE\ae-sdk\Examples" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- Configure CMake -----------------------------------------------------
      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DAE_SDK_PATH="$AE_SDK_PATH"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DAE_SDK_PATH="$env:AE_SDK_PATH"

      # --- Build ---------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release

      # --- Sanity check the output --------------------------------------------
      - name: Verify build output (macOS)
        if: runner.os == 'macOS'
        run: |
          test -d "${{ matrix.plugin-path }}/Contents/MacOS"
          file "${{ matrix.plugin-path }}/Contents/MacOS/CorridorKey"
          ls -la "${{ matrix.plugin-path }}/Contents/Resources/"
          codesign -dvvv "${{ matrix.plugin-path }}" 2>&1 | head -5

      - name: Verify build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "${{ matrix.plugin-path }}")) {
            throw "Plugin binary not found at ${{ matrix.plugin-path }}"
          }
          Get-Item "${{ matrix.plugin-path }}" | Format-List

      # --- Upload as artifact (available from the Actions tab) -----------------
      # On macOS we zip the .plugin bundle ourselves before upload so the
      # bundle directory name is preserved. If we upload the .plugin directory
      # directly, actions/upload-artifact flattens the top-level wrapper name
      # and consumers (the installer job) lose the "CorridorKey.plugin"
      # grouping. A zip round-trip keeps the bundle intact and downloads
      # deterministically.
      - name: Zip plugin bundle for upload (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/plugin
          zip -qry CorridorKey-plugin.zip CorridorKey.plugin

      - name: Upload plugin artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/plugin/CorridorKey-plugin.zip
          retention-days: 30

      - name: Upload plugin artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.plugin-path }}
          retention-days: 30

  # =============================================================================
  # macOS installer — produces a shippable .pkg from the plugin artifact.
  # =============================================================================
  installer-macos:
    name: Installer (macOS .pkg)
    runs-on: macos-latest
    needs: plugin-build
    steps:
      - uses: actions/checkout@v4

      # --- Download the plugin artifact built by plugin-build -----------------
      # The macOS plugin-build zips CorridorKey.plugin into CorridorKey-plugin.zip
      # before upload so the .plugin bundle wrapper is preserved across the
      # actions/upload+download round-trip. Unzip it where build_macos.sh
      # expects: build/plugin/CorridorKey.plugin/
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: CorridorKey-macOS
          path: artifact

      - name: Unpack plugin bundle into build dir
        run: |
          mkdir -p build/plugin
          unzip -q artifact/CorridorKey-plugin.zip -d build/plugin
          test -d build/plugin/CorridorKey.plugin/Contents/MacOS
          file build/plugin/CorridorKey.plugin/Contents/MacOS/CorridorKey

      # --- Build the .pkg via our local script --------------------------------
      # scripts/installer/build_macos.sh is designed to work identically on
      # the CI runner and locally — it downloads python-build-standalone,
      # stages the payload, runs pkgbuild + productbuild, and drops the
      # result in dist/. No CI-specific logic inside the script itself.
      - name: Build .pkg installer
        run: |
          chmod +x scripts/installer/build_macos.sh installer/macos/scripts/postinstall
          ./scripts/installer/build_macos.sh --version 0.1.0-${GITHUB_SHA::7}

      - name: Verify .pkg
        run: |
          PKG=$(ls dist/CorridorKey-*.pkg | head -1)
          echo "Built: $PKG"
          ls -la "$PKG"
          # Expand to inspect structure without installing
          pkgutil --expand "$PKG" /tmp/pkg-inspect
          echo "--- Distribution file ---"
          head -30 /tmp/pkg-inspect/Distribution
          echo "--- Component payload (first 20 entries) ---"
          lsbom /tmp/pkg-inspect/CorridorKey-component.pkg/Bom 2>/dev/null | head -20 || true
          echo "--- Postinstall script first 5 lines ---"
          head -5 /tmp/pkg-inspect/CorridorKey-component.pkg/Scripts/postinstall

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-Installer-macOS
          path: dist/CorridorKey-*.pkg
          retention-days: 30

  # =============================================================================
  # Windows installer — produces a shippable .exe from the plugin artifact.
  # =============================================================================
  installer-windows:
    name: Installer (Windows .exe)
    runs-on: windows-latest
    needs: plugin-build
    steps:
      - uses: actions/checkout@v4

      # --- Download the plugin artifact built by plugin-build -----------------
      # The Windows plugin-build uploads the raw CorridorKey.aex (single file,
      # no bundle wrapper on Windows, so no zip round-trip needed the way
      # macOS needs one). Drop it where build_windows.ps1 expects it by
      # default: build_win\plugin\Release\CorridorKey.aex
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: CorridorKey-Windows
          path: build_win/plugin/Release

      - name: Verify downloaded .aex
        shell: pwsh
        run: |
          $aex = "build_win/plugin/Release/CorridorKey.aex"
          if (-not (Test-Path $aex)) {
              throw "Plugin .aex not found at $aex after artifact download"
          }
          $size = (Get-Item $aex).Length
          Write-Host "Downloaded .aex: $aex ($size bytes)"

      # --- Install InnoSetup 6 -----------------------------------------------
      # windows-latest GitHub runners ship Chocolatey pre-installed, so this
      # is the fastest route to ISCC.exe. choco places it at
      #   C:\Program Files (x86)\Inno Setup 6\ISCC.exe
      # which is one of the candidates build_windows.ps1 already auto-probes.
      - name: Install InnoSetup 6
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --limit-output
          # Verify ISCC is on PATH after the install (choco refreshenv quirk)
          $iscc = Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe','C:\Program Files\Inno Setup 6\ISCC.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after choco install" }
          Write-Host "ISCC: $($iscc.FullName)"

      # --- Build the .exe via our local script --------------------------------
      # scripts/installer/build_windows.ps1 is designed to work identically on
      # the CI runner and locally — downloads python-build-standalone, stages
      # the payload, runs ISCC, and drops the result in dist/. No CI-specific
      # logic inside the script itself.
      - name: Build .exe installer
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          ./scripts/installer/build_windows.ps1 -Version "0.1.0-$sha"

      - name: Verify .exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/CorridorKey-*-windows-x64.exe | Select-Object -First 1
          if (-not $exe) { throw "Installer .exe not found in dist/" }
          Write-Host "Built: $($exe.FullName)"
          $sizeMb = [int]($exe.Length / 1MB)
          Write-Host "Size: ${sizeMb} MB"

          # Cheap structural sanity check: an InnoSetup-built .exe always
          # starts with "MZ" (PE magic) and contains the magic marker
          # "Inno Setup" somewhere in its resources. Full extraction would
          # need innounp + 40 MB of dependencies; this is enough to catch
          # a build that silently produced a zero-byte or corrupted file.
          if ($exe.Length -lt 1MB) { throw "Installer is suspiciously small: $($exe.Length) bytes" }
          $bytes = [System.IO.File]::ReadAllBytes($exe.FullName)[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
              throw "Installer does not start with MZ — not a valid PE"
          }
          Write-Host "PE header OK"

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorridorKey-Installer-Windows
          path: dist/CorridorKey-*-windows-x64.exe
          retention-days: 30
