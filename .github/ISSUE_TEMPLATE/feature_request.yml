name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Before filing, please check that
        [existing issues](https://github.com/iamjoshuadavies/corridorkey-ae/issues?q=is%3Aissue)
        don't already cover it.

        For architectural non-goals (true async render, parallel MFR inference,
        CPU fallback, AMD/Intel GPU support) see [CONTRIBUTING.md](https://github.com/iamjoshuadavies/corridorkey-ae/blob/main/CONTRIBUTING.md#architectural-non-goals)
        — those are decided and won't be re-litigated.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain or missing capability you're hitting.
      placeholder: |
        When I export a 10-minute 4K sequence with CorridorKey on every shot,
        the render takes ~45 minutes. A batch/export mode that processed frames
        without AE's per-frame overhead would cut this significantly.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should CorridorKey do? Rough sketches are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this, and why they don't work.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links to similar features in other tools, etc.
